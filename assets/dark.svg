<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 610" width="100%" height="100%" preserveAspectRatio="xMidYMid meet">
  <title>Darshan Parthasarathy - AI/Full Stack - Dark Mode Banner</title>
  <defs>
    <!-- Fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Fira+Code:wght@400;500&amp;display=swap');
      .inter { font-family: 'Inter', sans-serif; }
      .fira { font-family: 'Fira Code', monospace; }
      
      #ascii-portrait text { fill: url(#asciiGradient); }
    </style>

    <!-- Base Colors & Gradients -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#030712" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>

    <!-- Main Accent Gradient -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#22D3EE;#10B981;#7C3AED" dur="10s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#10B981">
        <animate attributeName="stop-color" values="#10B981;#7C3AED;#22D3EE;#10B981" dur="10s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- ASCII Gradient -->
    <linearGradient id="asciiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE">
        <animate attributeName="stop-color" values="#22D3EE;#7C3AED;#10B981;#22D3EE" dur="8s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#7C3AED">
        <animate attributeName="stop-color" values="#7C3AED;#10B981;#22D3EE;#7C3AED" dur="8s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Panel Definition -->
    <rect id="panelBase" width="1180" height="610" rx="24" fill="url(#bgGradient)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- Filters and Effects -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#22D3EE" flood-opacity="0.6"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="pillsGlow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feFlood flood-color="#10B981" flood-opacity="0.3"/>
        <feComposite in2="blur" operator="in"/>
        <feMerge>
            <feMergeNode/>
            <feMergeNode in="SourceGraphic"/>
        </feMerge>
    </filter>

    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.05 0 0 0 0 0.08 0 0 0 0 0.15 0 0 0 0.1 0"/>
    </filter>

    <!-- Mask for sequential reveal -->
    <mask id="revealMask">
      <rect x="0" y="0" width="100%" height="100%" fill="white" />
      <rect x="0" y="0" width="100%" height="100%" fill="black" transform="translate(0,610)">
          <animate attributeName="transform" from="translate(0,610)" to="translate(0,0)" dur="1s" begin="0.5s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.4 0 0.2 1" />
      </rect>
    </mask>

  </defs>

  <!-- BACKGROUND ELEMENTS -->
  <use href="#panelBase"/>

  <!-- Noise Texture -->
  <rect width="1180" height="610" rx="24" filter="url(#noise)" opacity="0.03"/>

  <!-- Floating Radial Gradients -->
  <ellipse cx="200" cy="150" rx="150" ry="100" fill="#7C3AED" filter="url(#glow)" opacity="0.1">
    <animate attributeName="cx" values="200;250;200" dur="20s" repeatCount="indefinite" />
    <animate attributeName="cy" values="150;100;150" dur="15s" repeatCount="indefinite" />
  </ellipse>
  <ellipse cx="1000" cy="500" rx="200" ry="120" fill="#10B981" filter="url(#glow)" opacity="0.1">
    <animate attributeName="cx" values="1000;950;1000" dur="25s" repeatCount="indefinite" />
    <animate attributeName="cy" values="500;550;500" dur="18s" repeatCount="indefinite" />
  </ellipse>

  <!-- Tiny Animated Particles -->
  <circle cx="590" cy="305" r="1.5" fill="white" opacity="0.4">
    <animateMotion dur="10s" repeatCount="indefinite" path="M0,0 C10,-10 20,-20 0,-40 C-20,-60 -10,-70 0,-100 z"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="5s" repeatCount="indefinite" />
  </circle>
  <circle cx="200" cy="400" r="1.2" fill="cyan" opacity="0.3">
    <animateMotion dur="14s" begin="-5s" repeatCount="indefinite" path="M0,0 C-15,-5 -25,-15 -10,-35 C5,-55 15,-65 -5,-95 z"/>
    <animate attributeName="opacity" values="0.3;0;0.3" dur="7s" repeatCount="indefinite" />
  </circle>

  <!-- Border Shimmer -->
  <rect width="1180" height="610" rx="24" fill="none" stroke="url(#accentGradient)" stroke-width="1.5" stroke-dasharray="200, 1000">
    <animate attributeName="stroke-dashoffset" values="0;1200" dur="6s" repeatCount="indefinite" />
  </rect>

  <!-- ======================= -->
  <!-- LEFT SIDE: ASCII ART    -->
  <!-- ======================= -->
  <g transform="translate(30, 60)">
    <g id="ascii-container">
        <!-- Floating animation -->
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,8; 0,0" dur="6s" repeatCount="indefinite" ease="easeInOut" />

        <g id="ascii-portrait" class="fira" font-size="10" font-weight="600" xml:space="preserve">
            <!-- Portrait ASCII Art -->
            <text x="20" y="16" opacity="0">                      .##***....<animate attributeName="opacity" values="0;1" dur="0.03s" begin="0.80s" fill="freeze"/></text>
            <text x="20" y="30" opacity="0">                  #%%%#########*=<animate attributeName="opacity" values="0;1" dur="0.03s" begin="0.83s" fill="freeze"/></text>
            <text x="20" y="44" opacity="0">                 +%%%%%%%%#########*#<animate attributeName="opacity" values="0;1" dur="0.03s" begin="0.86s" fill="freeze"/></text>
            <text x="20" y="58" opacity="0">                -%%%%%%%%%#%*=#%*%%#*=<animate attributeName="opacity" values="0;1" dur="0.03s" begin="0.89s" fill="freeze"/></text>
            <text x="20" y="72" opacity="0">                %%%%%%%%*=:::::::-#*#<animate attributeName="opacity" values="0;1" dur="0.03s" begin="0.92s" fill="freeze"/></text>
            <text x="20" y="86" opacity="0">                %%%%%%*==-:::+#-:-+<animate attributeName="opacity" values="0;1" dur="0.03s" begin="0.95s" fill="freeze"/></text>
            <text x="20" y="100" opacity="0">                -*+#+#+=-::.=-:::*:<animate attributeName="opacity" values="0;1" dur="0.03s" begin="0.98s" fill="freeze"/></text>
            <text x="20" y="114" opacity="0">                 *=++===::::::::::<animate attributeName="opacity" values="0;1" dur="0.03s" begin="1.01s" fill="freeze"/></text>
            <text x="20" y="128" opacity="0">                  %=====-::::::-=:<animate attributeName="opacity" values="0;1" dur="0.03s" begin="1.04s" fill="freeze"/></text>
            <text x="20" y="142" opacity="0">                   %====-::-=-:.=-<animate attributeName="opacity" values="0;1" dur="0.03s" begin="1.07s" fill="freeze"/></text>
            <text x="20" y="156" opacity="0">                    ===+=-::::=:::<animate attributeName="opacity" values="0;1" dur="0.03s" begin="1.10s" fill="freeze"/></text>
            <text x="20" y="170" opacity="0">                    =====+#=::::.<animate attributeName="opacity" values="0;1" dur="0.03s" begin="1.13s" fill="freeze"/></text>
            <text x="20" y="184" opacity="0">                    ==--===+=+.<animate attributeName="opacity" values="0;1" dur="0.03s" begin="1.16s" fill="freeze"/></text>
            <text x="20" y="198" opacity="0">                  .#%=--:::--:#+:<animate attributeName="opacity" values="0;1" dur="0.03s" begin="1.19s" fill="freeze"/></text>
            <text x="20" y="212" opacity="0">                  *#=-:-:::::=#*++=:<animate attributeName="opacity" values="0;1" dur="0.03s" begin="1.22s" fill="freeze"/></text>
            <text x="20" y="226" opacity="0">              .+####=::=::-:=#******==+.<animate attributeName="opacity" values="0;1" dur="0.03s" begin="1.25s" fill="freeze"/></text>
            <text x="20" y="240" opacity="0">           -+###%%#*#-:-:-:####********+++=-<animate attributeName="opacity" values="0;1" dur="0.03s" begin="1.28s" fill="freeze"/></text>
            <text x="20" y="254" opacity="0">       -############%#-::=###***#**********+=<animate attributeName="opacity" values="0;1" dur="0.03s" begin="1.31s" fill="freeze"/></text>
            <text x="20" y="268" opacity="0">      -##############*#%*##*#*******%*******+=.<animate attributeName="opacity" values="0;1" dur="0.03s" begin="1.34s" fill="freeze"/></text>
            <text x="20" y="282" opacity="0">      ###################*#*************##**++=.<animate attributeName="opacity" values="0;1" dur="0.03s" begin="1.37s" fill="freeze"/></text>
            <text x="20" y="296" opacity="0">     *##################*##*##**********%*****+=<animate attributeName="opacity" values="0;1" dur="0.03s" begin="1.40s" fill="freeze"/></text>
            <text x="20" y="310" opacity="0">     #####%##############*#*************#******+:<animate attributeName="opacity" values="0;1" dur="0.03s" begin="1.43s" fill="freeze"/></text>
            <text x="20" y="324" opacity="0">     ##################*####*#*********##*******=<animate attributeName="opacity" values="0;1" dur="0.03s" begin="1.46s" fill="freeze"/></text>
            <text x="20" y="338" opacity="0">     #####%%##########%######*#*******##%#**#***=:<animate attributeName="opacity" values="0;1" dur="0.03s" begin="1.49s" fill="freeze"/></text>
            <text x="20" y="352" opacity="0">    %####%#%##########%##########******###*#****++<animate attributeName="opacity" values="0;1" dur="0.03s" begin="1.52s" fill="freeze"/></text>
            <text x="20" y="366" opacity="0">    #######%######################*****#%###***+*+.<animate attributeName="opacity" values="0;1" dur="0.03s" begin="1.55s" fill="freeze"/></text>
            <text x="20" y="380" opacity="0">   .####%########%################****######******-<animate attributeName="opacity" values="0;1" dur="0.03s" begin="1.58s" fill="freeze"/></text>
            <text x="20" y="394" opacity="0">   ######%#########################***#######**##*+<animate attributeName="opacity" values="0;1" dur="0.03s" begin="1.61s" fill="freeze"/></text>
            <text x="20" y="408" opacity="0">   #########-#########%######*####***########%#****.<animate attributeName="opacity" values="0;1" dur="0.03s" begin="1.64s" fill="freeze"/></text>
        </g>

        <!-- Moving Scanline Effect -->
        <rect x="-10" y="0" width="400" height="440" fill="url(#panelBase)" opacity="0.12">
            <animate attributeName="y" values="-440;440;-440" dur="6s" repeatCount="indefinite" />
        </rect>
    </g>
  </g>

  <!-- ======================= -->
  <!-- RIGHT SIDE: TERMINAL    -->
  <!-- ======================= -->
  <g transform="translate(450, 30)">
    <!-- Terminal Background (Glassmorphism) -->
    <rect width="700" height="550" rx="16" fill="#0F172A" fill-opacity="0.7" stroke="rgba(255,255,255,0.08)" stroke-width="1">
       <animate attributeName="fill-opacity" values="0.7;0.8;0.7" dur="8s" repeatCount="indefinite" />
    </rect>
    
    <!-- Sequential Reveal Mask Apply -->
    <g mask="url(#revealMask)">

    <!-- Greeting & Name -->
    <text x="30" y="60" class="inter" font-size="28" font-weight="600" fill="#94A3B8">Hi 👋,</text>
    <text x="30" y="105" class="inter" font-size="48" font-weight="700" fill="white">I'm <tspan fill="url(#accentGradient)">Darshan Parthasarathy</tspan></text>

    <!-- Animated Typing Role -->
    <g transform="translate(30, 160)">
        <text class="fira" font-size="24" font-weight="500" fill="#F8FAFC">
            <tspan x="0" dy="0" visibility="hidden">
              <animate attributeName="visibility" from="hidden" to="visible" begin="2s" fill="freeze"/>
              <animate attributeName="textContent" values="AI Engineer|;Full Stack Developer|;Building Intelligent Systems|" dur="9s" begin="2s" repeatCount="indefinite" calcMode="discrete"/>
            </tspan>
        </text>
        
        <!-- Blinking Cursor -->
        <rect x="0" y="-20" width="12" height="26" fill="white" opacity="0">
            <animate attributeName="opacity" values="1;0;1" dur="1s" begin="2s" repeatCount="indefinite" />
            <animateTransform attributeName="transform" type="translate" values="0,0; 180,0; 0,0" dur="9s" begin="2s" repeatCount="indefinite" calcMode="discrete"/>
        </rect>
    </g>

    <!-- Sequential Info Items -->
    <g transform="translate(30, 210)" class="inter" font-size="16" fill="#94A3B8">
        <g opacity="0">
            <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.0s" fill="freeze"/>
            <text dy="0">• Chennai, Tamil Nadu, India</text>
        </g>
        <g opacity="0">
            <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.3s" fill="freeze"/>
            <text dy="30">• M.Tech CSE @ SSN College of Engineering</text>
        </g>
        <g opacity="0">
            <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="3.6s" fill="freeze"/>
            <text dy="60">• Current Focus: Agentic AI &amp; RAG Pipelines</text>
        </g>
    </g>

    <!-- Skills Section -->
    <g transform="translate(30, 310)">
        <text class="inter" font-size="18" font-weight="600" fill="white" opacity="0">
          <animate attributeName="opacity" from="0" to="1" dur="0.3s" begin="4s" fill="freeze"/>
          Featured Tech Stack
        </text>
        
        <g transform="translate(0, 30)">
            <defs>
                <rect id="pillRect" width="90" height="32" rx="16"/>
            </defs>

            <!-- Row 1 -->
            <g transform="translate(0,0)" class="fira" font-size="12" font-weight="500" fill="white" filter="url(#pillsGlow)" opacity="0">
                <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.2s" fill="freeze"/>
                
                <g transform="translate(0,0)">
                    <use href="#pillRect" fill="#030712" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
                    <text x="45" y="20" text-anchor="middle">Python</text>
                </g>
                <g transform="translate(100,0)">
                    <use href="#pillRect" fill="#030712" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
                    <text x="45" y="20" text-anchor="middle">PyTorch</text>
                </g>
                <g transform="translate(200,0)">
                    <use href="#pillRect" fill="#030712" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
                    <text x="45" y="20" text-anchor="middle">LangChain</text>
                </g>
                <g transform="translate(300,0)">
                    <use href="#pillRect" fill="#030712" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
                    <text x="45" y="20" text-anchor="middle">TypeScript</text>
                </g>
                <g transform="translate(400,0)">
                    <use href="#pillRect" fill="#030712" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
                    <text x="45" y="20" text-anchor="middle">React</text>
                </g>
            </g>

            <!-- Row 2 -->
            <g transform="translate(0,42)" class="fira" font-size="12" font-weight="500" fill="white" filter="url(#pillsGlow)" opacity="0">
                <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="4.5s" fill="freeze"/>
                
                <g transform="translate(0,0)">
                    <use href="#pillRect" width="100" fill="#030712" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
                    <text x="50" y="20" text-anchor="middle">FastAPI</text>
                </g>
                <g transform="translate(110,0)">
                    <use href="#pillRect" width="80" fill="#030712" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
                    <text x="40" y="20" text-anchor="middle">Django</text>
                </g>
                <g transform="translate(200,0)">
                    <use href="#pillRect" width="90" fill="#030712" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
                    <text x="45" y="20" text-anchor="middle">Pinecone</text>
                </g>
                <g transform="translate(300,0)">
                    <use href="#pillRect" width="80" fill="#030712" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
                    <text x="40" y="20" text-anchor="middle">AWS</text>
                </g>
                 <g transform="translate(390,0)">
                    <use href="#pillRect" width="80" fill="#030712" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
                    <text x="40" y="20" text-anchor="middle">Docker</text>
                </g>
            </g>
        </g>
    </g>

  

    <!-- Sequential Mask End -->
    </g>
  </g>

</svg>
